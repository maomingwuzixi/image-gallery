<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片相册</title>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="header">
<div class="container">
<h1><i class="fas fa-images"></i> 图片相册</h1>
<p>GitHub 存储 | 跨设备同步</p>
</div>
</header>

<section class="upload-section">
<div class="container">
<div class="upload-box">
<label for="file-upload" class="upload-btn">
<i class="fas fa-upload"></i> 选择图片上传
</label>
<input type="file" id="file-upload" multiple accept="image/*">
<p class="tip">支持 JPG/PNG/GIF，单张 ≤20MB</p>
</div>
</div>
</section>

<section class="gallery-section">
<div class="container">
<div class="gallery-controls">
<button id="sync-github" class="btn"><i class="fas fa-sync"></i> 同步</button>
<button id="download-all" class="btn"><i class="fas fa-download"></i> 批量下载</button>
<button id="clear-all" class="btn btn-danger"><i class="fas fa-trash"></i> 清空</button>
</div>
<div id="image-gallery" class="image-gallery">
<div class="empty-tip">暂无图片</div>
</div>
</div>
</section>

<footer class="footer">
<div class="container">
<p>存储于 GitHub 仓库</p>
</div>
</footer>
<script src="script.js"></script>
</body>
</html>
